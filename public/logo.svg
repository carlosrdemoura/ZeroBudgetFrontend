<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="#0F1C2E"/>

  <!-- Outer ring accent (subtle depth) -->
  <rect x="0.5" y="0.5" width="39" height="39" rx="9.5" stroke="white" stroke-opacity="0.07"/>

  <!-- Z letterform -->
  <path
    d="M10 12H30L10 28H30"
    stroke="white"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Green dot accent — the "zero" / balanced budget marker -->
  <circle cx="30" cy="12" r="3.5" fill="#16C47F"/>
</svg>
